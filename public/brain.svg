<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Main gradient for the play button -->
    <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <!-- Glow gradient for the flow wave -->
    <linearGradient id="flowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="50%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#2dd4bf"/>
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Inner shadow for depth -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
  </defs>

  <!-- Outer circle ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#ringGrad)" stroke-width="18" opacity="0.25"/>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="210" fill="url(#playGrad)" opacity="0.12"/>

  <!-- Flow wave 1 (behind play button) -->
  <path d="M80 300 Q160 220, 256 280 Q352 340, 432 260"
        fill="none" stroke="url(#flowGrad)" stroke-width="14" stroke-linecap="round" opacity="0.3"/>

  <!-- Flow wave 2 -->
  <path d="M60 340 Q150 270, 256 320 Q362 370, 452 290"
        fill="none" stroke="url(#flowGrad)" stroke-width="10" stroke-linecap="round" opacity="0.2"/>

  <!-- Play button triangle -->
  <path d="M200 148 L200 364 L380 256 Z" fill="url(#playGrad)" filter="url(#glow)"/>

  <!-- Play button highlight (inner triangle for depth) -->
  <path d="M220 180 L220 332 L352 256 Z" fill="url(#playGrad)" opacity="0.5"/>

  <!-- Small progress dots along the flow -->
  <circle cx="110" cy="290" r="6" fill="#818cf8" opacity="0.6"/>
  <circle cx="190" cy="258" r="5" fill="#60a5fa" opacity="0.5"/>
  <circle cx="330" cy="298" r="5" fill="#38bdf8" opacity="0.5"/>
  <circle cx="412" cy="268" r="6" fill="#2dd4bf" opacity="0.6"/>

  <!-- Circular progress arc (top-right quadrant, suggesting tracking) -->
  <path d="M256 46 A210 210 0 0 1 466 256"
        fill="none" stroke="url(#flowGrad)" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <!-- Progress arc end dot -->
  <circle cx="466" cy="256" r="10" fill="#2dd4bf" opacity="0.7"/>
</svg>